[general]
import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]

[window]
dimensions = {
  columns = 86,
  lines = 24
}
padding = {
  x = 8,
  y = 8
}
opacity = 0.99
title = "Alacritty Term"
dynamic_title = false
level = "AlwaysOnTop"

[font]
normal = {
  family = "JetBrainsMono Nerd Font", style = "Regular"
}
bold = {
  family = "JetBrainsMono Nerd Font", style = "Bold"
}
italic = {
  family = "JetBrainsMono Nerd Font", style = "Italic"
}
bold_italic = {
  family = "JetBrainsMono Nerd Font", style = "Bold Italic"
}
size = 14

[selection]
save_to_clipboard = true

[cursor]
style = {
  shape = "Beam",
  blinking = "Always"
}
blink_interval = 400
blink_timeout = 10

[terminal]
shell = "/bin/zsh"
# TODO: DISABLE FOR SERVER CONFI
osc52 = "CopyPaste"

[mouse]
hide_when_typing = true
bindings = [
  { mouse = "Right", mods = "Control", action = "Paste" },
]

